<!-- Header/Navbar Premium -->
<header class="fixed top-0 w-full z-40 navbar-blur">
  <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
    <div class="flex items-center space-x-3 group">
      <div
        class="w-14 h-14 p-2 bg-gradient-cyan-violet rounded-xl flex items-center justify-center shadow-glow-cyan"
      >
        <img
          src="images/icon.png"
          alt="Tecniled"
          class="w-full h-full object-contain"
        />
      </div>
      <div>
        <a
          href="#principal"
          data-route="principal"
          onclick="
            loadPage('principal');
            return false;
          "
        >
          <h1
            class="font-display text-2xl font-black bg-gradient-to-r from-cyan-neon via-primary-blue to-violet-neon bg-clip-text text-transparent neon-glow"
          >
            TECNILED
          </h1>
          <p class="text-xs text-gray-400 font-semibold">
            Precisión Electrónica
          </p>
        </a>
      </div>
    </div>

    <nav class="hidden lg:flex space-x-10">
      <a
        class="text-gray-400 hover:text-cyan-neon font-medium transition-all"
        data-route="productos"
        onclick="
          loadPage('productos');
          return false;
        "
        >Productos</a
      >

      <a
        href="#servicios"
        class="text-gray-400 hover:text-violet-neon font-medium transition-all"
        onclick="
          loadPage('principal', { section: 'servicios' });
          return false;
        "
        >Servicios</a
      >
      <a
        href="#proceso"
        class="text-gray-400 hover:text-lime-neon font-medium transition-all"
        onclick="
          loadPage('principal', { section: 'proceso' });
          return false;
        "
        >Cómo Comprar</a
      >
      <a
        href="#contacto"
        class="text-gray-400 hover:text-cyan-neon font-medium transition-all"
        onclick="
          loadPage('principal', { section: 'contacto' });
          return false;
        "
        >Contacto</a
      >
    </nav>
  </div>
</header>
