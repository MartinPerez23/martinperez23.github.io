<!-- Hoja de estilos base de toda la SPA -->
<style>
    :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --primary: #22d3ee;
        --secondary: #f97316;
        --ok: #34d399;
        --border: #374151;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
            radial-gradient(circle at 10% 0%, rgba(34, 211, 238, 0.18), transparent 30%),
            radial-gradient(circle at 90% 20%, rgba(249, 115, 22, 0.18), transparent 28%),
            var(--bg);
        min-height: 100vh;
    }

    .container {
        width: min(1080px, 92%);
        margin: 0 auto;
    }

    header {
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(12px);
        background: rgba(15, 23, 42, 0.88);
        border-bottom: 1px solid var(--border);
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1rem 0;
    }

    .brand {
        font-weight: 700;
        letter-spacing: 0.04em;
    }

    nav {
        display: flex;
        gap: 1rem;
    }

    nav a {
        color: var(--text);
        text-decoration: none;
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        transition: background 0.2s;
    }

    nav a:hover,
    nav a.active {
        background: var(--panel-2);
    }

    #app {
        min-height: calc(100vh - 170px);
        padding: 2rem 0 3rem;
    }

    .hero {
        background: linear-gradient(135deg, rgba(34, 211, 238, 0.15), rgba(249, 115, 22, 0.1));
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2rem;
    }

    .hero h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
    }

    .section {
        margin-top: 2rem;
        background: rgba(17, 24, 39, 0.72);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.5rem;
    }

    .section h2 {
        margin-top: 0;
    }

    .btn {
        border: none;
        border-radius: 0.6rem;
        padding: 0.65rem 0.95rem;
        font-weight: 600;
        cursor: pointer;
        background: var(--primary);
        color: #082f49;
    }

    .btn-secondary {
        background: var(--secondary);
        color: #fff7ed;
    }

    .productos-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
    }

    .producto-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0.9rem;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .producto-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        background: #0b1220;
    }

    .producto-card-body {
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
    }

    .producto-detalle {
        display: grid;
        grid-template-columns: minmax(250px, 420px) 1fr;
        gap: 1.5rem;
        align-items: start;
    }

    .producto-detalle img {
        width: 100%;
        border-radius: 0.9rem;
        border: 1px solid var(--border);
        background: #0b1220;
    }

    .chip {
        display: inline-block;
        margin-top: 0.5rem;
        font-size: 0.85rem;
        padding: 0.3rem 0.55rem;
        border-radius: 999px;
        background: rgba(52, 211, 153, 0.18);
        color: var(--ok);
        border: 1px solid rgba(52, 211, 153, 0.38);
    }

    footer {
        border-top: 1px solid var(--border);
        padding: 1.1rem 0;
        color: var(--muted);
        background: rgba(15, 23, 42, 0.9);
    }

    @media (max-width: 780px) {
        .topbar {
            flex-direction: column;
            align-items: flex-start;
        }

        nav {
            flex-wrap: wrap;
        }

        .producto-detalle {
            grid-template-columns: 1fr;
        }
    }
</style>
