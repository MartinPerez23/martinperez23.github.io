<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Space Grotesk", sans-serif;
    background: linear-gradient(
      135deg,
      #050810 0%,
      #0a0e27 25%,
      #0f1423 50%,
      #05070f 75%,
      #050810 100%
    );
    background-size: 400% 400%;
    animation: gradient-shift 15s ease infinite;
    color: #e0e0e0;
    overflow-x: hidden;
    position: relative;
  }

  @keyframes gradient-shift {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  /* Efecto de luz ambiental */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background:
      radial-gradient(
        circle at 20% 50%,
        rgba(0, 243, 255, 0.05) 0%,
        transparent 50%
      ),
      radial-gradient(
        circle at 80% 80%,
        rgba(188, 19, 254, 0.05) 0%,
        transparent 50%
      );
    pointer-events: none;
    z-index: 0;
  }

  /* Glass Morphism Base */
  .glass {
    background: rgba(10, 14, 39, 0.5);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0, 243, 255, 0.15);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .glass-strong {
    background: rgba(10, 14, 39, 0.8);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(0, 243, 255, 0.2);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
  }

  /* Sombras profesionales */
  .shadow-glow-cyan {
    box-shadow:
      0 0 0 1px rgba(0, 243, 255, 0.2),
      0 10px 30px rgba(0, 243, 255, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.5),
      inset 0 1px 2px rgba(255, 255, 255, 0.1);
  }

  .shadow-glow-violet {
    box-shadow:
      0 0 0 1px rgba(188, 19, 254, 0.2),
      0 10px 30px rgba(188, 19, 254, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.5),
      inset 0 1px 2px rgba(255, 255, 255, 0.1);
  }

  .shadow-glow-lime {
    box-shadow:
      0 0 0 1px rgba(57, 255, 20, 0.2),
      0 10px 30px rgba(57, 255, 20, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.5),
      inset 0 1px 2px rgba(255, 255, 255, 0.1);
  }

  .shadow-heavy {
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
  }

  /* Efectos de luz neón */
  .neon-glow {
    text-shadow:
      0 0 10px rgba(0, 243, 255, 0.5),
      0 0 20px rgba(0, 243, 255, 0.3),
      0 0 30px rgba(188, 19, 254, 0.2);
  }

  /* Degradados impactantes */
  .gradient-cyan-violet {
    background: linear-gradient(135deg, #00f3ff 0%, #bc13fe 100%);
  }

  .gradient-blue-lime {
    background: linear-gradient(135deg, #0d59f2 0%, #39ff14 100%);
  }

  .gradient-violet-pink {
    background: linear-gradient(135deg, #bc13fe 0%, #ff0055 100%);
  }

  /* Cards con profundidad 3D */
  .card-3d {
    perspective: 1000px;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
    transform-style: preserve-3d;
  }

  .card-3d:hover {
    transform: translateY(-20px) translateZ(40px) rotateX(5deg);
    box-shadow:
      0 0 0 1px rgba(0, 243, 255, 0.3),
      0 20px 60px rgba(0, 243, 255, 0.25),
      0 40px 80px rgba(0, 0, 0, 0.7);
  }

  .card-3d::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(0, 243, 255, 0.1),
      rgba(188, 19, 254, 0.1)
    );
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .card-3d:hover::before {
    opacity: 1;
  }

  /* Botones con efecto láser */
  .btn-laser {
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .btn-laser::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.4),
      transparent
    );
    transition: left 0.6s ease;
    z-index: 1;
  }

  .btn-laser:hover::before {
    left: 100%;
  }

  .btn-laser:hover {
    transform: translateY(-3px);
    box-shadow:
      0 0 30px rgba(0, 243, 255, 0.6),
      0 10px 30px rgba(0, 0, 0, 0.4);
  }

  /* Líneas de código/circuito animadas */
  .circuit-line {
    position: relative;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00f3ff, transparent);
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
    animation: drift 4s linear infinite;
  }

  /* Efecto de escaneo */
  .scan-effect {
    position: relative;
    overflow: hidden;
  }

  .scan-effect::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 243, 255, 0.03),
      rgba(0, 243, 255, 0.03) 1px,
      transparent 1px,
      transparent 2px
    );
    pointer-events: none;
    animation: scan-move 8s linear infinite;
  }

  @keyframes scan-move {
    0% {
      transform: translateY(-100%);
    }
    100% {
      transform: translateY(100%);
    }
  }

  /* Scroll suave */
  html {
    scroll-behavior: smooth;
  }

  /* Estrellas/partículas flotantes */
  .floating-particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: #00f3ff;
    border-radius: 50%;
    opacity: 0.5;
    animation: float-slow 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }

  /* Navbar blur intenso */
  .navbar-blur {
    background: linear-gradient(
      180deg,
      rgba(5, 8, 16, 0.95) 0%,
      rgba(5, 8, 16, 0.8) 100%
    );
    backdrop-filter: blur(40px);
    border-bottom: 1px solid rgba(0, 243, 255, 0.1);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
  }

  /* Hover effect para links */
  a {
    position: relative;
    text-decoration: none;
  }

  a::after {
    content: "";
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #00f3ff, #bc13fe);
    transition: width 0.3s ease;
  }

  a:hover::after {
    width: 100%;
  }

  @media (max-width: 768px) {
    .card-3d:hover {
      transform: translateY(-10px);
    }
  }
</style>
