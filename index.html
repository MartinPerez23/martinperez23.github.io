<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tecniled - Componentes electrónicos premium y servicios técnicos especializados. Reparación profesional de TV, LED, consolas DJ y diagnóstico electrónico avanzado."
    />
    <meta
      name="keywords"
      content="componentes electrónicos, LED, potenciómetros, consolas DJ, reparación técnica, diagnóstico electrónico"
    />

    <title>
      Tecniled - Precisión Electrónica | Componentes Premium y Reparaciones
      Técnicas
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tech-dark": "#0a0e27",
              "tech-darker": "#050810",
              "tech-bg": "#0f1423",
              "cyan-neon": "#00f3ff",
              "violet-neon": "#bc13fe",
              "lime-neon": "#39ff14",
              "primary-blue": "#0d59f2",
              "accent-pink": "#ff0055",
              "deep-blue": "#001a4d",
            },
            fontFamily: {
              display: ["Orbitron", "sans-serif"],
              tech: ["Space Grotesk", "sans-serif"],
            },
            backdropBlur: {
              xs: "2px",
              sm: "4px",
              md: "12px",
              lg: "16px",
              xl: "24px",
            },
            animation: {
              "glow-pulse":
                "glow-pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              "float-slow": "float-slow 8s ease-in-out infinite",
              drift: "drift 20s linear infinite",
              shimmer: "shimmer 2s linear infinite",
              "pulse-deep":
                "pulse-deep 2s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              "glow-box": "glow-box 3s ease-in-out infinite",
            },
            keyframes: {
              "glow-pulse": {
                "0%, 100%": {
                  "box-shadow":
                    "0 0 30px rgba(0, 243, 255, 0.2), 0 0 60px rgba(0, 243, 255, 0.1)",
                  filter: "brightness(1)",
                },
                "50%": {
                  "box-shadow":
                    "0 0 60px rgba(0, 243, 255, 0.5), 0 0 120px rgba(0, 243, 255, 0.3)",
                  filter: "brightness(1.1)",
                },
              },
              "float-slow": {
                "0%, 100%": { transform: "translateY(0px) translateX(0px)" },
                "25%": { transform: "translateY(-30px) translateX(10px)" },
                "50%": { transform: "translateY(0px) translateX(20px)" },
                "75%": { transform: "translateY(-20px) translateX(5px)" },
              },
              drift: {
                "0%": { transform: "translateX(-100%)" },
                "100%": { transform: "translateX(100%)" },
              },
              shimmer: {
                "0%": { opacity: "0.2" },
                "50%": { opacity: "1" },
                "100%": { opacity: "0.2" },
              },
              "pulse-deep": {
                "0%, 100%": {
                  "box-shadow": "0 0 0 0 rgba(0, 243, 255, 0.7)",
                },
                "50%": {
                  "box-shadow": "0 0 0 30px rgba(0, 243, 255, 0)",
                },
              },
              "glow-box": {
                "0%, 100%": {
                  "box-shadow":
                    "0 0 20px rgba(0, 243, 255, 0.3), inset 0 0 20px rgba(0, 243, 255, 0.1)",
                },
                "50%": {
                  "box-shadow":
                    "0 0 40px rgba(0, 243, 255, 0.6), inset 0 0 30px rgba(0, 243, 255, 0.2)",
                },
              },
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <!-- partials/header.html -->
    <div id="header-container"></div>

    <!-- Contenedor central requerido para la SPA -->
    <div id="app"></div>

    <!-- partials/footer.html -->
    <div id="footer-container"></div>

    <!-- partials/js.html se carga por JS durante el bootstrap -->

    <script>
      // Carga texto desde ruta absoluta o relativa para GitHub Pages de usuario/proyecto.
      // Se intentan varias variantes para que funcione tanto en HTTP como en file:// y
      // tomando en cuenta posibles prefijos de repositorio en GitHub Pages.
      async function fetchWithFallback(path) {
        const paths = [
          path,
          path.replace(/^\//, "./"), // relativo desde la página actual
        ];

        // si la aplicación está servida desde un subdirectorio, incluir ruta base
        const base = location.pathname.replace(/\/[^\/]*$/, "");
        if (base && base !== "/") {
          const trimmed = path.replace(/^\//, "");
          paths.push(base + "/" + trimmed);
          paths.push(base + "/" + trimmed.replace(/^\//, ""));
        }

        for (const currentPath of paths) {
          try {
            const response = await fetch(currentPath);
            if (response.ok) {
              return await response.text();
            }
          } catch (error) {
            // No hacemos nada, probamos otra ruta.
          }
        }

        console.warn("No se pudo cargar: " + path);
        // Devolvemos cadena vacía para que quien llame no detenga la ejecución.
        return "";
      }

      // Carga el partial de estilos dentro del <head>.
      async function loadCssPartial() {
        const cssHtml = await fetchWithFallback("/partials/css.html");
        if (cssHtml) {
          document.head.insertAdjacentHTML("beforeend", cssHtml);
        } else {
          console.warn("Estilos no cargados, usando valores por defecto.");
        }
      }

      // Carga un partial HTML dentro de un contenedor.
      async function loadHtmlPartial(path, containerId) {
        const html = await fetchWithFallback(path);
        const container = document.getElementById(containerId);
        if (container) {
          if (html) {
            container.innerHTML = html;
          } else {
            container.innerHTML = `<div class='container'><p>404: No se pudo cargar la pagina correctamente, vuelva a intentarlo mas tarde</p></div>`;
          }
        }
      }

      // Carga y ejecuta scripts definidos en partials/js.html.
      async function loadJsPartial() {
        const scriptsHtml = await fetchWithFallback("/partials/js.html");
        const temp = document.createElement("div");
        temp.innerHTML = scriptsHtml;

        temp.querySelectorAll("script").forEach((sourceScript) => {
          const newScript = document.createElement("script");

          if (sourceScript.src) {
            newScript.src = sourceScript.src;
          } else {
            newScript.textContent = sourceScript.textContent;
          }

          document.body.appendChild(newScript);
        });
      }

      // Inicializa layout + JS SPA; cada paso se maneja por separado para no interrumpir
      // la ejecución si una de las cargas falla (por ejemplo al abrir el archivo desde
      // file:// en lugar de un servidor HTTP).
      (async function bootstrap() {
        try {
          await loadCssPartial();
        } catch (e) {
          console.error("Error cargando estilos:", e);
        }

        try {
          await loadHtmlPartial("/partials/header.html", "header-container");
        } catch (e) {
          console.error("Error cargando header:", e);
        }

        try {
          await loadHtmlPartial("/partials/footer.html", "footer-container");
        } catch (e) {
          console.error("Error cargando footer:", e);
        }

        try {
          await loadJsPartial();
        } catch (e) {
          console.error("Error cargando scripts de la SPA:", e);
        }
      })();
    </script>
  </body>
</html>
